<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Carrossel Slide 1 · Cover com imagem · 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C842;
  --teal:   #5ECBA8;
  --pink:   #E87DB0;
  --blue:   #5A8ED4;
  --text:   #2B3641;
  --white:  #FFFFFF;
  --gray-bg: #F4F5F7;
  --gray-mid: #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; background: #FFFFFF; }
body { font-family: 'Nunito', sans-serif; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

/* ── Canvas ── */
#canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

/* Mesmos círculos do slide-01-cover (direita conecta com slide 2) */
#canvas .c-tl { width: 320px; height: 320px; background: var(--pink);   top: -100px; left: -100px; }
#canvas .c-tr { width: 220px; height: 220px; background: var(--yellow); top:  -65px; right: -65px; }
#canvas .c-bl { width: 160px; height: 160px; background: var(--blue);   bottom: -45px; left: -45px; }
#canvas .c-br { width: 240px; height: 240px; background: var(--teal);   bottom: -70px; right: -70px; }

/* Layout dois blocos: imagem à esquerda, texto à direita */
#body {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  gap: 0;
  z-index: 2;
}

/* Bloco de imagem — metade esquerda, full height */
.image-block {
  width: 50%;
  height: 100%;
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 48px 24px 48px 48px;
}

/* Imagem — ocupa quase toda a altura */
.img-placeholder {
  width: 100%;
  height: 100%;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
}
.img-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}

/* Bloco de texto — metade direita */
.text-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 64px 140px 32px;
  text-align: left;
}

.eyebrow {
  font-size: 18px;
  font-weight: 800;
  color: var(--pink);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.headline {
  font-size: 68px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  letter-spacing: -1.5px;
  margin-bottom: 28px;
}
.headline em { font-style: normal; color: var(--pink); }

.subhead {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  opacity: 0.6;
  line-height: 1.4;
  margin-bottom: 40px;
}

/* Seta de deslize */
.swipe-hint {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 20px;
  font-weight: 800;
  color: var(--pink);
}
.swipe-hint .arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px; height: 40px;
  background: var(--pink);
  border-radius: 50%;
}

</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <!-- Bloco de imagem à esquerda -->
    <div class="image-block">
      <div class="img-placeholder">
        <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=600&q=80" alt="Escola">
      </div>
    </div>

    <!-- Bloco de texto à direita -->
    <div class="text-block">
      <span class="eyebrow">Gestão Escolar</span>

      <h1 class="headline">
        Sua escola<br>ainda perde<br>tempo com <em>papel?</em>
      </h1>

      <p class="subhead">
        Descubra os 5 sinais<br>que pedem mudança urgente
      </p>

      <div class="swipe-hint">
        <span>deslize para ver</span>
        <div class="arrow">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
