<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Carrossel Slide 2 · Text sem card · 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C842;
  --teal:   #5ECBA8;
  --pink:   #E87DB0;
  --blue:   #5A8ED4;
  --text:   #2B3641;
  --white:  #FFFFFF;
  --gray-bg: #F4F5F7;
  --gray-mid: #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; background: #FFFFFF; }
body { font-family: 'Nunito', sans-serif; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

/* ── Canvas ── */
#canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

/* Mesmos círculos do slide-02-text (conecta com slide 1 e slide 3) */
#canvas .c-tl { width: 200px; height: 200px; background: var(--yellow); top:  -58px; left: -58px; }
#canvas .c-tr { width: 240px; height: 240px; background: var(--teal);   top:  -70px; right: -70px; }
#canvas .c-bl { width: 200px; height: 200px; background: var(--blue);   bottom: -58px; left: -58px; }
#canvas .c-br { width: 220px; height: 220px; background: var(--pink);   bottom: -65px; right: -65px; }

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 120px 120px;
  text-align: center;
  z-index: 2;
  gap: 0;
}

.label {
  font-size: 18px;
  font-weight: 800;
  color: var(--yellow);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 48px;
  background: rgba(245,200,66,0.12);
  padding: 10px 24px;
  border-radius: 999px;
}

.headline {
  font-size: 78px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 40px;
}
.headline em { font-style: normal; color: var(--yellow); }

.body-text {
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  opacity: 0.65;
  line-height: 1.5;
  max-width: 820px;
}
.body-text strong { color: var(--text); opacity: 1; font-weight: 900; }

</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <p class="label">Sinal #1</p>

    <h2 class="headline">
      Tempo perdido<br>em tarefas <em>manuais</em>
    </h2>

    <p class="body-text">
      Sua secretaria não pode gastar<br>o dia inteiro em <strong>planilhas e papelada</strong><br>enquanto os pais esperam atendimento.
    </p>
  </div>
</div>
</body>
</html>
