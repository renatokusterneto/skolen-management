<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Carrossel Slide 1 · Cover Imagem C · Horizontal · 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C842;
  --teal:   #5ECBA8;
  --pink:   #E87DB0;
  --blue:   #5A8ED4;
  --text:   #2B3641;
  --white:  #FFFFFF;
  --gray-bg: #F4F5F7;
  --gray-mid: #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; background: #FFFFFF; }
body { font-family: 'Nunito', sans-serif; }

.circle { border-radius: 50%; position: absolute; }

/* ── Canvas ── */
#canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

/* Mesmos círculos de conexão */
#canvas .c-tl { width: 320px; height: 320px; background: var(--pink);   top: -220px; left: -220px; }
#canvas .c-tr { width: 220px; height: 220px; background: var(--yellow); top:  -65px; right: -65px; }
#canvas .c-bl { width: 160px; height: 160px; background: var(--blue);   bottom: -45px; left: -45px; }
#canvas .c-br { width: 240px; height: 240px; background: var(--teal);   bottom: -70px; right: -70px; }

/* Layout vertical: imagem em cima, texto embaixo */
#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 2;
}

/* Bloco de imagem — metade superior */
.image-block {
  width: 100%;
  height: 50%;
  flex-shrink: 0;
  padding: 20px 48px 48px 48px;
}

.img-wrap {
  width: 100%;
  height: 100%;
  border-radius: 28px;
  overflow: hidden;
}
.img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

/* Bloco de texto — metade inferior */
.text-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 130px 80px 20px 80px;
  text-align: left;
}

.eyebrow {
  font-size: 18px;
  font-weight: 800;
  color: var(--pink);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.headline {
  font-size: 72px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 22px;
}
.headline em { font-style: normal; color: var(--pink); }

.subhead {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  opacity: 0.6;
  line-height: 1.35;
  margin-bottom: 32px;
}

/* Seta de deslize */
.swipe-hint {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 20px;
  font-weight: 800;
  color: var(--pink);
}
.swipe-hint .arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px; height: 40px;
  background: var(--pink);
  border-radius: 50%;
}
</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <!-- Texto na metade superior -->
    <div class="text-block">
      <p class="eyebrow">Gestão Escolar</p>

      <h1 class="headline">
        Sua escola ainda perde<br>tempo com <em>papel?</em>
      </h1>

      <p class="subhead">
        Descubra os 5 sinais que pedem mudança urgente
      </p>

      <div class="swipe-hint">
        <span>deslize para ver</span>
        <div class="arrow">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Imagem na metade inferior -->
    <div class="image-block">
      <div class="img-wrap">
        <img src="https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=1080&q=80" alt="Escola">
      </div>
    </div>
  </div>
</div>
</body>
</html>
