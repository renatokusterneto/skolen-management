<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Story 2 · Prova Social · MOFU · 1080×1920</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:     #F5C842;
  --teal:       #5ECBA8;
  --pink:       #E87DB0;
  --blue:       #5A8ED4;
  --text:       #2B3641;
  --white:      #FFFFFF;
  --gray-mid:   #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 1080px; height: 1920px; overflow: hidden; background: var(--white); }
body { font-family: 'Nunito', sans-serif; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.ad-logo-mark.sz56 { width: 56px; height: 56px; }
.ad-logo-mark.sz56 span { width: 24px; height: 24px; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }
.ad-logo-text.sz44 { font-size: 44px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }

/* ── Canvas ── */
#t5-canvas {
  width: 1080px;
  height: 1920px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}
#t5-canvas .c-tl {
  width: 440px; height: 440px;
  background: var(--pink);
  top: -140px; left: -140px;
}
#t5-canvas .c-tr {
  width: 280px; height: 280px;
  background: var(--yellow);
  top: -70px; right: -70px;
}
#t5-canvas .c-bl {
  width: 320px; height: 320px;
  background: var(--yellow);
  bottom: -100px; left: -100px;
}
#t5-canvas .c-br {
  width: 400px; height: 400px;
  background: var(--pink);
  bottom: -120px; right: -120px;
}
#t5-body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 200px 100px 180px;
  text-align: center;
  gap: 56px;
  z-index: 2;
}
.t5-stars {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 36px;
}
.t5-star {
  width: 52px; height: 52px;
  flex-shrink: 0;
}
.t5-quote-card {
  background: #FEF6FA;
  border: 2px solid rgba(232,125,176,0.25);
  border-radius: 32px;
  padding: 72px 80px;
  max-width: 880px;
  width: 100%;
}
.t5-quote-text {
  font-size: 64px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -1px;
  margin-bottom: 0;
  text-wrap: pretty;
  word-break: break-word;
  hyphens: auto;
}
.t5-quote-text em { font-style: normal; color: var(--pink); }
.t5-attribution {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.t5-avatar {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--yellow));
  flex-shrink: 0;
  box-shadow: 0 8px 28px rgba(232,125,176,0.35);
  overflow: hidden;
  object-fit: cover;
}
.t5-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}
.t5-attr-info { text-align: left; }
.t5-attr-name { font-size: 40px; font-weight: 900; color: var(--text); }
.t5-attr-role { font-size: 28px; font-weight: 600; color: var(--gray-mid); margin-top: 4px; }
.t5-cta-btn {
  background: var(--pink);
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 34px;
  font-weight: 800;
  padding: 26px 68px;
  border-radius: 999px;
  border: none;
  box-shadow: 0 12px 36px rgba(232,125,176,0.35);
}
#t5-logo {
  position: absolute;
  bottom: 100px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 3;
}
</style>
</head>
<body>
<div id="t5-canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="t5-body">
    <div class="t5-attribution">
      <div class="t5-avatar" id="t5-avatar-wrap"><img id="t5-avatar-img" src="" alt="Avatar"/></div>
      <div class="t5-attr-info">
        <p class="t5-attr-name">Diretora Carla M.</p>
        <p class="t5-attr-role">Escola Privada · Minas Gerais</p>
      </div>
    </div>

    <div class="t5-quote-card">
      <p class="t5-quote-text">
        A secretária quis usar<br>
        desde o <em>primeiro dia.</em>
      </p>
      <div class="t5-stars">
        <svg class="t5-star" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.6 9H22L16 13.4L18.2 20.5L12 16.3L5.8 20.5L8 13.4L2 9H9.4Z" fill="#F5C842" stroke="#F5C842" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
        <svg class="t5-star" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.6 9H22L16 13.4L18.2 20.5L12 16.3L5.8 20.5L8 13.4L2 9H9.4Z" fill="#F5C842" stroke="#F5C842" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
        <svg class="t5-star" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.6 9H22L16 13.4L18.2 20.5L12 16.3L5.8 20.5L8 13.4L2 9H9.4Z" fill="#F5C842" stroke="#F5C842" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
        <svg class="t5-star" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.6 9H22L16 13.4L18.2 20.5L12 16.3L5.8 20.5L8 13.4L2 9H9.4Z" fill="#F5C842" stroke="#F5C842" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
        <svg class="t5-star" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.6 9H22L16 13.4L18.2 20.5L12 16.3L5.8 20.5L8 13.4L2 9H9.4Z" fill="#F5C842" stroke="#F5C842" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
      </div>
    </div>

    <button class="t5-cta-btn">Agende uma demonstração</button>
  </div>

  <div id="t5-logo">
    <div class="ad-logo-mark sz56">
      <span class="lm-tl"></span>
      <span class="lm-tr"></span>
      <span class="lm-bl"></span>
      <span class="lm-br"></span>
    </div>
    <span class="ad-logo-text sz44">Skolen</span>
  </div>
</div>
<script>
// Mapa de nomes → foto (adicione mais conforme necessário)
const DIRECTOR_PHOTOS = {
  'carla':    'https://randomuser.me/api/portraits/women/44.jpg',
  'ana':      'https://randomuser.me/api/portraits/women/68.jpg',
  'maria':    'https://randomuser.me/api/portraits/women/65.jpg',
  'patricia': 'https://randomuser.me/api/portraits/women/17.jpg',
  'fernanda': 'https://randomuser.me/api/portraits/women/30.jpg',
  'juliana':  'https://randomuser.me/api/portraits/women/54.jpg',
  'amanda':   'https://randomuser.me/api/portraits/women/47.jpg',
  'aline':    'https://randomuser.me/api/portraits/women/22.jpg',
  'roberto':  'https://randomuser.me/api/portraits/men/46.jpg',
  'carlos':   'https://randomuser.me/api/portraits/men/32.jpg',
  'joao':     'https://randomuser.me/api/portraits/men/54.jpg',
  'paulo':    'https://randomuser.me/api/portraits/men/61.jpg',
  'marcos':   'https://randomuser.me/api/portraits/men/75.jpg',
  'andre':    'https://randomuser.me/api/portraits/men/28.jpg',
  'lucas':    'https://randomuser.me/api/portraits/men/18.jpg',
};
// Foto padrão por gênero inferido pelo título
const DEFAULT_FEMALE = 'https://randomuser.me/api/portraits/women/40.jpg';
const DEFAULT_MALE   = 'https://randomuser.me/api/portraits/men/40.jpg';

(function () {
  const nameEl = document.getElementById('t5-attr-name');
  const img    = document.getElementById('t5-avatar-img');
  if (!nameEl || !img) return;

  const fullText = nameEl.textContent.toLowerCase();
  // Normaliza: remove acentos e pega apenas letras
  const normalize = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z]/g, ' ');
  const words = normalize(fullText).split(/\s+/).filter(Boolean);

  let photoUrl = null;
  for (const w of words) {
    if (DIRECTOR_PHOTOS[w]) { photoUrl = DIRECTOR_PHOTOS[w]; break; }
  }
  if (!photoUrl) {
    photoUrl = fullText.includes('diretora') ? DEFAULT_FEMALE : DEFAULT_MALE;
  }

  img.src = photoUrl;
  img.onerror = () => {
    // Fallback: iniciais em ui-avatars
    const rawName = nameEl.textContent.replace(/diret[oa]r[a]?\s*/i, '').trim();
    img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(rawName)}&background=E87DB0&color=fff&size=240&bold=true`;
  };
})();
</script>
</body>
</html>
