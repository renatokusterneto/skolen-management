<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Feed 3 · Inadimplência · MOFU · 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:     #F5C842;
  --teal:       #5ECBA8;
  --pink:       #E87DB0;
  --blue:       #5A8ED4;
  --text:       #2B3641;
  --white:      #FFFFFF;
  --gray-bg:    #F4F5F7;
  --gray-mid:   #8A95A3;
  --gray-light: #E8EAED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: #ECEEF2; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.ad-logo-mark.sz40 { width: 40px; height: 40px; }
.ad-logo-mark.sz40 span { width: 17px; height: 17px; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }
.ad-logo-text { font-size: 36px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }

/* ── Canvas ── */
#t3-canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}
#t3-canvas .c-tl {
  width: 200px; height: 200px;
  background: var(--yellow);
  top: -60px; left: -60px;
}
#t3-canvas .c-tr {
  width: 300px; height: 300px;
  background: var(--pink);
  top: -80px; right: -80px;
}
#t3-canvas .c-bl {
  width: 350px; height: 350px;
  background: var(--teal);
  bottom: -100px; left: -100px;
}
#t3-canvas .c-br {
  width: 160px; height: 160px;
  background: var(--yellow);
  bottom: -40px; right: -40px;
}
#t3-body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 110px;
  z-index: 2;
}
#t3-canvas .eyebrow {
  font-size: 20px;
  font-weight: 800;
  color: var(--gray-mid);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.t3-stat {
  font-size: 200px;
  font-weight: 900;
  color: var(--pink);
  line-height: 0.85;
  letter-spacing: -8px;
  margin-bottom: 24px;
}
.t3-stat-label {
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 48px;
  max-width: 700px;
}
.t3-stat-label em { font-style: normal; color: var(--pink); }
.t3-divider {
  width: 80px;
  height: 5px;
  background: var(--yellow);
  border-radius: 3px;
  margin: 0 auto 48px;
}
.t3-body-text {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  opacity: 0.65;
  line-height: 1.6;
  max-width: 680px;
}
#t3-logo {
  position: absolute;
  bottom: 56px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 3;
}
</style>
</head>
<body>
<div id="t3-canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="t3-body">
    <p class="eyebrow">Cobrança Automática</p>
    <div class="t3-stat">-68%</div>
    <h2 class="t3-stat-label">
      Redução de <em>inadimplência</em><br>nos primeiros 60 dias
    </h2>
    <div class="t3-divider"></div>
  </div>

  <div id="t3-logo">
    <div class="ad-logo-mark sz40">
      <span class="lm-tl"></span>
      <span class="lm-tr"></span>
      <span class="lm-bl"></span>
      <span class="lm-br"></span>
    </div>
    <span class="ad-logo-text">Skolen</span>
  </div>
</div>
</body>
</html>
