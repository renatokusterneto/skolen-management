<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Carrossel Evasão · Slide 7 · CTA · 1080×1080</title>
<link rel="stylesheet" href="file:///Users/renatokusterneto/Skolen/.claude/skills/carrousel/fonts/nunito.css">
<style>
:root {
  --yellow: #F5C842;
  --teal:   #5ECBA8;
  --pink:   #E87DB0;
  --blue:   #5A8ED4;
  --text:   #2B3641;
  --white:  #FFFFFF;
  --gray-bg: #F4F5F7;
  --gray-mid: #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: #ECEEF2; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

#canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

#canvas .c-tl { width: 240px; height: 240px; background: var(--teal);   top:  -70px; left: -70px; }
#canvas .c-tr { width: 180px; height: 180px; background: var(--yellow); top:  -52px; right: -52px; }
#canvas .c-bl { width: 220px; height: 220px; background: var(--pink);   bottom: -65px; left: -65px; }
#canvas .c-br { width: 280px; height: 280px; background: var(--blue);   bottom: -80px; right: -80px; }

.c-bg {
  width: 700px; height: 700px;
  background: rgba(94,203,168,0.05);
  border-radius: 50%;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 110px 140px;
  text-align: center;
  z-index: 2;
  gap: 0;
}

.big-logo-mark {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 88px;
  height: 88px;
  margin-bottom: 44px;
}
.big-logo-mark span {
  display: block;
  border-radius: 50%;
  width: 39px;
  height: 39px;
}

.eyebrow {
  font-size: 22px;
  font-weight: 800;
  color: var(--teal);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.headline {
  font-size: 78px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 32px;
}
.headline em { font-style: normal; color: var(--teal); }

.subhead {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  opacity: 0.6;
  line-height: 1.3;
  margin-bottom: 64px;
}

.cta-btn {
  background: var(--teal);
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 30px;
  font-weight: 900;
  padding: 24px 64px;
  border-radius: 999px;
  border: none;
  box-shadow: 0 16px 40px rgba(43,54,65,0.30);
  letter-spacing: -0.3px;
  cursor: pointer;
  margin-bottom: 28px;
}

#logo {
  position: absolute;
  bottom: 52px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 3;
}
.logo-text { font-size: 36px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
</style>
</head>
<body>
<div id="canvas">
  <div class="c-bg"></div>
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <div class="big-logo-mark">
      <span style="background:var(--yellow)"></span>
      <span style="background:var(--teal)"></span>
      <span style="background:var(--pink)"></span>
      <span style="background:var(--blue)"></span>
    </div>

    <p class="eyebrow">Sua escola pode chegar antes</p>

    <h2 class="headline">
      Quer ver risco de<br><em>evasão antes?</em>
    </h2>

    <p class="subhead">
      Mostre como a Skolen<br>funciona na prática.
    </p>

    <button class="cta-btn">Solicitar Demonstração</button>
  </div>

  <div id="logo">
    <div class="ad-logo-mark" style="width:40px;height:40px;gap:4px;">
      <span class="lm-tl" style="width:17px;height:17px"></span>
      <span class="lm-tr" style="width:17px;height:17px"></span>
      <span class="lm-bl" style="width:17px;height:17px"></span>
      <span class="lm-br" style="width:17px;height:17px"></span>
    </div>
    <span class="logo-text">Skolen</span>
  </div>
</div>
</body>
</html>
