<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Carrossel Slide 5 · Quote · 1080×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C842;
  --teal:   #5ECBA8;
  --pink:   #E87DB0;
  --blue:   #5A8ED4;
  --text:   #2B3641;
  --white:  #FFFFFF;
  --gray-bg: #F4F5F7;
  --gray-mid: #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: #ECEEF2; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

/* ── Canvas ── */
#canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

#canvas .c-tl { width: 220px; height: 220px; background: var(--blue);   top:  -65px; left: -65px; }
#canvas .c-tr { width: 200px; height: 200px; background: var(--yellow); top:  -58px; right: -58px; }
#canvas .c-bl { width: 240px; height: 240px; background: var(--pink);   bottom: -70px; left: -70px; }
#canvas .c-br { width: 200px; height: 200px; background: var(--blue);   bottom: -58px; right: -58px; }

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 100px 130px;
  text-align: center;
  z-index: 2;
  gap: 0;
}

.quote-card {
  max-width: 880px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.quote-content { flex: 1; }
.quote-text {
  font-size: 46px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 24px;
  letter-spacing: -0.5px;
}
.quote-text em { font-style: normal; color: var(--blue); }
.quote-author {
  font-size: 22px;
  font-weight: 600;
  color: var(--gray-mid);
}

</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <div class="quote-card">
      <div class="quote-content">
        <p class="quote-text">
          "Descobri que perdia alunos todo mês<br>sem saber o motivo. Agora<br>eu <em>vejo tudo em tempo real.</em>"
        </p>
        <p class="quote-author">Marcos L., Diretor · Escola em São Paulo</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
