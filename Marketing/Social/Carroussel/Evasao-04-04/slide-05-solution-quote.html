<style>

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 100px 130px;
  text-align: center;
  z-index: 2;
  gap: 0;

.quote-card {
  max-width: 880px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

.quote-text {

  font-weight: 800;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 24px;
  letter-spacing: -0.5px;
}
.quote-text em { font-style: normal; color: var(--blue); }
.quote-author {
  font-size: 22px;
  font-weight: 600;
  color: var(--gray-mid);
}
</style>

<body>

  <div class="circle c-br"></div>

  <div id="body">
