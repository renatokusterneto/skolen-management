<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Carrossel Slide 6 · Solution Número · 1080×1080</title>
<link rel="stylesheet" href="file:///Users/renatokusterneto/Skolen/.claude/skills/carrousel/fonts/nunito.css">
<style>
:root {
  --yellow: #F5C842;
  --teal:   #5ECBA8;
  --pink:   #E87DB0;
  --blue:   #5A8ED4;
  --text:   #2B3641;
  --white:  #FFFFFF;
  --gray-bg: #F4F5F7;
  --gray-mid: #8A95A3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: #ECEEF2; }

.circle { border-radius: 50%; position: absolute; }

#canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

#canvas .c-tl { width: 200px; height: 200px; background: var(--yellow); top:  -58px; left: -58px; }
#canvas .c-tr { width: 240px; height: 240px; background: var(--teal);   top:  -70px; right: -70px; }
#canvas .c-bl { width: 200px; height: 200px; background: var(--blue);   bottom: -58px; left: -58px; }
#canvas .c-br { width: 220px; height: 220px; background: var(--pink);   bottom: -65px; right: -65px; }

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 100px 130px;
  text-align: center;
  z-index: 2;
  gap: 0;
}

.label {
  font-size: 20px;
  font-weight: 800;
  color: var(--gray-mid);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.stat {
  font-size: 240px;
  font-weight: 900;
  color: var(--pink);
  line-height: 0.85;
  letter-spacing: -10px;
  margin-bottom: 24px;
}

.stat-label {
  font-size: 42px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 40px;
}
.stat-label em { font-style: normal; color: var(--pink); }

.divider {
  width: 80px;
  height: 5px;
  background: var(--pink);
  border-radius: 3px;
  margin: 0 auto 36px;
}
</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <p class="label">Com a lógica certa</p>

    <div class="stat">3×</div>

    <h2 class="stat-label">
      mais eficaz agir no sinal<br>do que no <em>cancelamento</em>
    </h2>

    <div class="divider"></div>
  </div>
</div>
</body>
</html>
