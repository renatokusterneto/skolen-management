<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Story · Melhor Professor · MOFU · 1080×1920</title>
<link rel="stylesheet" href="file:///Users/renatokusterneto/Skolen/.claude/skills/carrousel/fonts/nunito.css">
<style>
:root {
  --yellow:     #F5C842;
  --teal:       #5ECBA8;
  --pink:       #E87DB0;
  --blue:       #5A8ED4;
  --text:       #2B3641;
  --white:      #FFFFFF;
  --gray-mid:   #8A95A3;
  --gray-light: #E8EAED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: #ECEEF2; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

#canvas {
  width: 1080px;
  height: 1920px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}
#canvas .c-tl {
  width: 500px; height: 500px;
  background: var(--yellow);
  top: -160px; left: -160px;
}
#canvas .c-tr {
  width: 320px; height: 320px;
  background: var(--blue);
  top: -80px; right: -80px;
}
#canvas .c-bl {
  width: 380px; height: 380px;
  background: var(--teal);
  bottom: -120px; left: -120px;
}
#canvas .c-br {
  width: 260px; height: 260px;
  background: var(--yellow);
  bottom: -70px; right: -70px;
}

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 160px 120px;
  z-index: 2;
  gap: 0;
}

.eyebrow {
  font-size: 26px;
  font-weight: 800;
  color: var(--gray-mid);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 48px;
}

.stat {
  font-size: 320px;
  font-weight: 900;
  color: var(--blue);
  line-height: 0.85;
  letter-spacing: -12px;
  margin-bottom: 40px;
}

.stat-label {
  font-size: 56px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -1px;
  margin-bottom: 64px;
  max-width: 800px;
}
.stat-label em { font-style: normal; color: var(--blue); }

.divider {
  width: 100px;
  height: 6px;
  background: var(--yellow);
  border-radius: 3px;
  margin: 0 auto 64px;
}

.subtext {
  font-size: 36px;
  font-weight: 600;
  color: var(--text);
  opacity: 0.55;
  line-height: 1.6;
  max-width: 780px;
}

#logo {
  position: absolute;
  bottom: 120px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 3;
}
.logo-text { font-size: 44px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <p class="eyebrow">Desempenho de Professores</p>
    <div class="stat">73%</div>
    <h2 class="stat-label">
      dos diretores não sabem qual professor<br><em>retém mais</em>
    </h2>
    <div class="divider"></div>
    <p class="subtext">
      O Skolen mostra quem retém mais alunos —<br>
      e quem precisa de apoio.
    </p>
  </div>

  <div id="logo">
    <div class="ad-logo-mark" style="width:48px;height:48px;gap:5px;">
      <span class="lm-tl" style="width:20px;height:20px"></span>
      <span class="lm-tr" style="width:20px;height:20px"></span>
      <span class="lm-bl" style="width:20px;height:20px"></span>
      <span class="lm-br" style="width:20px;height:20px"></span>
    </div>
    <span class="logo-text">Skolen</span>
  </div>
</div>
</body>
</html>
