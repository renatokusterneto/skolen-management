<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Story · Antes/Depois · Melhor Professor · BOFU · 1080×1920</title>
<link rel="stylesheet" href="file:///Users/renatokusterneto/Skolen/.claude/skills/carrousel/fonts/nunito.css">
<style>
:root {
  --yellow:     #F5C842;
  --teal:       #5ECBA8;
  --pink:       #E87DB0;
  --blue:       #5A8ED4;
  --text:       #2B3641;
  --white:      #FFFFFF;
  --gray-bg:    #F4F5F7;
  --gray-mid:   #8A95A3;
  --gray-light: #E8EAED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 1080px; height: 1920px; overflow: hidden; background: var(--white); }
body { font-family: 'Nunito', sans-serif; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

#canvas {
  width: 1080px;
  height: 1920px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}
#canvas .c-tl {
  width: 380px; height: 380px;
  background: var(--pink);
  top: -120px; left: -120px;
}
#canvas .c-tr {
  width: 260px; height: 260px;
  background: var(--yellow);
  top: -70px; right: -70px;
}
#canvas .c-bl {
  width: 280px; height: 280px;
  background: var(--blue);
  bottom: -80px; left: -80px;
}
#canvas .c-br {
  width: 340px; height: 340px;
  background: var(--teal);
  bottom: -100px; right: -100px;
}

#header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 36px;
  z-index: 4;
  background: var(--white);
}
.header-title {
  font-size: 30px;
  font-weight: 800;
  color: var(--gray-mid);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.header-brand-text {
  font-size: 52px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -1px;
}

#body {
  position: absolute;
  top: 320px; left: 160px; right: 160px; bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  z-index: 2;
  justify-content: center;
}

.col {
  display: flex;
  flex-direction: column;
  border-radius: 28px;
  overflow: hidden;
  border: 2px solid var(--gray-light);
}
.col-header {
  padding: 28px 40px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.col-label {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.col-items {
  padding: 16px 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.col-item {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 30px;
  font-weight: 700;
  line-height: 1.3;
  background: var(--white);
  border-radius: 16px;
  padding: 16px 20px;
  border: 1.5px solid var(--gray-light);
}
.col-item-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 900;
}

.col-before { border-color: var(--gray-light); }
.col-before .col-header { background: var(--gray-bg); }
.col-before .col-label  { color: var(--gray-mid); }
.col-before .col-items  { background: #F8F9FB; }
.col-before .col-item   { color: #8A95A3; border-color: #E0E3E8; }
.col-before .col-item-icon { background: var(--gray-light); color: var(--gray-mid); }

.col-after { border-color: rgba(94,203,168,0.35); }
.col-after .col-header { background: #F0F9F5; }
.col-after .col-label  { color: var(--teal); }
.col-after .col-items  { background: #FAFFFE; }
.col-after .col-item   { color: var(--text); border-color: rgba(94,203,168,0.25); }
.col-after .col-item-icon { background: var(--teal); color: var(--white); }
</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="header">
    <span class="header-title">Gestão escolar antes e depois do</span>
    <div class="header-brand">
      <div class="ad-logo-mark" style="width:44px;height:44px;gap:5px;">
        <span class="lm-tl" style="width:18px;height:18px"></span>
        <span class="lm-tr" style="width:18px;height:18px"></span>
        <span class="lm-bl" style="width:18px;height:18px"></span>
        <span class="lm-br" style="width:18px;height:18px"></span>
      </div>
      <span class="header-brand-text">Skolen</span>
    </div>
  </div>

  <div id="body">
    <div class="col col-before">
      <div class="col-header">
        <span class="col-label">Antes</span>
      </div>
      <div class="col-items">
        <div class="col-item"><span class="col-item-icon">✕</span>Sem dado por professor</div>
        <div class="col-item"><span class="col-item-icon">✕</span>Decisão no feeling</div>
        <div class="col-item"><span class="col-item-icon">✕</span>Não sabe quem retém alunos</div>
        <div class="col-item"><span class="col-item-icon">✕</span>Rematrícula sem estratégia</div>
      </div>
    </div>

    <div class="col col-after">
      <div class="col-header">
        <span class="col-label">Com Skolen</span>
      </div>
      <div class="col-items">
        <div class="col-item"><span class="col-item-icon">✓</span>Desempenho por professor</div>
        <div class="col-item"><span class="col-item-icon">✓</span>Decisão baseada em dados</div>
        <div class="col-item"><span class="col-item-icon">✓</span>Taxa de retenção por turma</div>
        <div class="col-item"><span class="col-item-icon">✓</span>Rematrícula com inteligência</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
