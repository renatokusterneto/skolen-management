<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Feed · Melhor Professor · TOFU · 1080×1080</title>
<link rel="stylesheet" href="file:///Users/renatokusterneto/Skolen/.claude/skills/carrousel/fonts/nunito.css">
<style>
:root {
  --yellow:     #F5C842;
  --teal:       #5ECBA8;
  --pink:       #E87DB0;
  --blue:       #5A8ED4;
  --text:       #2B3641;
  --white:      #FFFFFF;
  --gray-bg:    #F4F5F7;
  --gray-mid:   #8A95A3;
  --gray-light: #E8EAED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; background: var(--white); }
body { font-family: 'Nunito', sans-serif; }

.circle { border-radius: 50%; position: absolute; }

.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.ad-logo-mark.sz40 { width: 40px; height: 40px; }
.ad-logo-mark.sz40 span { width: 17px; height: 17px; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }
.ad-logo-text { font-size: 36px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }

#t1-canvas {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}
#t1-canvas .c-tl {
  width: 320px; height: 320px;
  background: var(--pink);
  top: -100px; left: -100px;
}
#t1-canvas .c-tr {
  width: 220px; height: 220px;
  background: var(--yellow);
  top: -60px; right: -60px;
}
#t1-canvas .c-bl {
  width: 180px; height: 180px;
  background: var(--yellow);
  bottom: -50px; left: -50px;
}
#t1-canvas .c-br {
  width: 280px; height: 280px;
  background: var(--pink);
  bottom: -80px; right: -80px;
}
#t1-canvas .c-mid {
  width: 120px; height: 120px;
  background: var(--teal);
  top: 300px; right: 80px;
}
#t1-body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 110px;
  text-align: center;
  z-index: 2;
}
#t1-canvas .eyebrow {
  font-size: 22px;
  font-weight: 800;
  color: var(--pink);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
#t1-canvas .headline {
  font-size: 88px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  margin-bottom: 40px;
  letter-spacing: -2px;
}
#t1-canvas .headline em { font-style: normal; color: var(--pink); }
#t1-canvas .subhead {
  font-size: 40px;
  font-weight: 700;
  color: var(--text);
  opacity: 0.7;
  margin-bottom: 64px;
  line-height: 1.3;
}
#t1-canvas .subhead strong { color: var(--yellow); font-weight: 900; opacity: 1; }
#t1-logo {
  position: absolute;
  bottom: 56px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 3;
}
</style>
</head>
<body>
<div id="t1-canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>
  <div class="circle c-mid"></div>

  <div id="t1-body">
    <p class="eyebrow">Gestores de Escola</p>
    <h1 class="headline">
      Seu melhor professor,<br>você sabe <em>quem é?</em>
    </h1>
    <p class="subhead">
      <strong>Quem retém mais alunos define seu faturamento.</strong>
    </p>
  </div>

  <div id="t1-logo">
    <div class="ad-logo-mark sz40">
      <span class="lm-tl"></span>
      <span class="lm-tr"></span>
      <span class="lm-bl"></span>
      <span class="lm-br"></span>
    </div>
    <span class="ad-logo-text">Skolen</span>
  </div>
</div>
</body>
</html>
