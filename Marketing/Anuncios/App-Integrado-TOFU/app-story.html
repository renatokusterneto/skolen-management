<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skolen — Story · App dos Pais · MOFU · 1080×1920</title>
<link rel="stylesheet" href="file:///Users/renatokusterneto/Skolen/.claude/skills/carrousel/fonts/nunito.css">
<style>
:root {
  --yellow:     #F5C842;
  --teal:       #5ECBA8;
  --pink:       #E87DB0;
  --blue:       #5A8ED4;
  --text:       #2B3641;
  --white:      #FFFFFF;
  --gray-bg:    #F4F5F7;
  --gray-mid:   #8A95A3;
  --gray-light: #E8EAED;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: #ECEEF2; }

.circle { border-radius: 50%; position: absolute; }
.ad-logo-mark { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ad-logo-mark span { display: block; border-radius: 50%; }
.lm-tl { background: var(--yellow); }
.lm-tr { background: var(--teal); }
.lm-bl { background: var(--pink); }
.lm-br { background: var(--blue); }

#canvas {
  width: 1080px;
  height: 1920px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}
#canvas .c-tl {
  width: 420px; height: 420px;
  background: var(--teal);
  top: -130px; left: -130px;
}
#canvas .c-tr {
  width: 260px; height: 260px;
  background: var(--blue);
  top: -70px; right: -70px;
}
#canvas .c-bl {
  width: 300px; height: 300px;
  background: var(--blue);
  bottom: -90px; left: -90px;
}
#canvas .c-br {
  width: 400px; height: 400px;
  background: var(--teal);
  bottom: -120px; right: -120px;
}

#body {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 160px 100px 220px;
  text-align: center;
  z-index: 2;
  gap: 0;
}

.eyebrow {
  font-size: 26px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.headline {
  font-size: 96px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.0;
  letter-spacing: -2.5px;
  margin-bottom: 72px;
}
.headline em { font-style: normal; color: var(--blue); }

.phone-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 72px;
}
.phone-mockup {
  width: 340px;
  height: 620px;
  background: var(--text);
  border-radius: 44px;
  padding: 18px 14px;
  box-shadow: 0 40px 100px rgba(43,54,65,0.30);
  position: relative;
}
.phone-notch {
  width: 90px; height: 24px;
  background: #1a2630;
  border-radius: 12px;
  margin: 0 auto 14px;
}
.phone-screen {
  background: var(--white);
  border-radius: 28px;
  height: calc(100% - 54px);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.phone-topbar {
  background: var(--blue);
  padding: 16px 18px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.phone-topbar-logo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  width: 20px; height: 20px;
}
.phone-topbar-logo span { display: block; border-radius: 50%; }
.phone-topbar-text { font-size: 13px; font-weight: 900; color: var(--white); }
.phone-tabs {
  display: flex;
  border-bottom: 2px solid var(--gray-light);
  background: var(--white);
}
.phone-tab {
  flex: 1;
  padding: 9px 4px;
  font-size: 9px;
  font-weight: 800;
  text-align: center;
  color: var(--gray-mid);
}
.phone-tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); margin-bottom: -2px; }
.phone-content {
  flex: 1;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.phone-card {
  background: var(--gray-bg);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.phone-card-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.phone-card-lines { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.phone-line { height: 6px; border-radius: 3px; background: var(--gray-light); }
.phone-line.short { width: 60%; }
.phone-notif {
  background: var(--teal);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.phone-notif-icon { width: 16px; height: 16px; background: rgba(255,255,255,0.3); border-radius: 50%; flex-shrink: 0; }
.phone-notif-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.phone-notif-text .pl1 { height: 5px; background: rgba(255,255,255,0.7); border-radius: 2px; }
.phone-notif-text .pl2 { height: 5px; width: 70%; background: rgba(255,255,255,0.4); border-radius: 2px; }

.feature-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-self: stretch;
}
.feature-list li {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  font-size: 34px;
  font-weight: 700;
  color: var(--text);
}
.feature-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}

#logo {
  position: absolute;
  bottom: 120px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 3;
}
.logo-text { font-size: 44px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
</style>
</head>
<body>
<div id="canvas">
  <div class="circle c-tl"></div>
  <div class="circle c-tr"></div>
  <div class="circle c-bl"></div>
  <div class="circle c-br"></div>

  <div id="body">
    <p class="eyebrow">App para Famílias</p>
    <h2 class="headline">
      Pais conectados.<br><em>Escola organizada.</em>
    </h2>

    <div class="phone-wrap">
      <div class="phone-mockup">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="phone-topbar">
            <div class="phone-topbar-logo">
              <span style="background:var(--yellow)"></span>
              <span style="background:var(--teal)"></span>
              <span style="background:var(--pink)"></span>
              <span style="background:var(--blue)"></span>
            </div>
            <span class="phone-topbar-text">Skolen</span>
          </div>
          <div class="phone-tabs">
            <div class="phone-tab active">Início</div>
            <div class="phone-tab">Notas</div>
            <div class="phone-tab">Financeiro</div>
          </div>
          <div class="phone-content">
            <div class="phone-notif">
              <div class="phone-notif-icon"></div>
              <div class="phone-notif-text">
                <div class="pl1"></div>
                <div class="pl2"></div>
              </div>
            </div>
            <div class="phone-card">
              <span class="phone-card-dot" style="background:var(--teal)"></span>
              <div class="phone-card-lines">
                <div class="phone-line" style="background:var(--teal);opacity:0.5"></div>
                <div class="phone-line short"></div>
              </div>
            </div>
            <div class="phone-card">
              <span class="phone-card-dot" style="background:var(--blue)"></span>
              <div class="phone-card-lines">
                <div class="phone-line" style="background:var(--blue);opacity:0.4"></div>
                <div class="phone-line short"></div>
              </div>
            </div>
            <div class="phone-card">
              <span class="phone-card-dot" style="background:var(--yellow)"></span>
              <div class="phone-card-lines">
                <div class="phone-line" style="background:var(--yellow);opacity:0.5"></div>
                <div class="phone-line short"></div>
              </div>
            </div>
            <div class="phone-card">
              <span class="phone-card-dot" style="background:var(--pink)"></span>
              <div class="phone-card-lines">
                <div class="phone-line" style="background:var(--pink);opacity:0.4"></div>
                <div class="phone-line short"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <ul class="feature-list">
      <li>
        <span class="feature-dot" style="background:var(--teal)"></span>
        Notas e presença em tempo real
      </li>
      <li>
        <span class="feature-dot" style="background:var(--blue)"></span>
        Boletos e pagamentos no app
      </li>
      <li>
        <span class="feature-dot" style="background:var(--pink)"></span>
        Comunicados sem WhatsApp
      </li>
    </ul>
  </div>

  <div id="logo">
    <div class="ad-logo-mark" style="width:48px;height:48px;gap:5px;">
      <span class="lm-tl" style="width:20px;height:20px"></span>
      <span class="lm-tr" style="width:20px;height:20px"></span>
      <span class="lm-bl" style="width:20px;height:20px"></span>
      <span class="lm-br" style="width:20px;height:20px"></span>
    </div>
    <span class="logo-text">Skolen</span>
  </div>
</div>
</body>
</html>
